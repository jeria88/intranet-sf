{% extends 'base.html' %}
{% block title %}Registrar Reunión Manual | Intranet{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
    <h2 style="margin-top: 0;">➕ Registrar Reunión Manual</h2>
    <p style="color: var(--contrast-2); margin-bottom: 24px;">Utiliza este formulario para registrar reuniones ocurridas fuera del sistema de videollamadas.</p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px;">Sala Vinculada</label>
            <select name="room" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;" required>
                {% for room in rooms %}
                <option value="{{ room.id }}">{{ room.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px;">Fecha y Hora</label>
            <input type="datetime-local" name="scheduled_at" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px;">Agenda / Resumen</label>
            <textarea name="agenda" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-height: 80px;" placeholder="Escribe aquí de qué trató la reunión..."></textarea>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-weight: 600; margin-bottom: 8px;">URL de Grabación (Opcional)</label>
            <input type="text" name="recording_url" placeholder="https://..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
        </div>

        <div style="display: flex; gap: 12px;">
            <button type="submit" style="flex: 1; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer;">Registrar Reunión</button>
            <a href="{% url 'meetings:recording_list' %}" style="flex: 1; text-align: center; text-decoration: none; color: var(--contrast-2); border: 1px solid #e2e8f0; padding: 14px; border-radius: 8px; font-weight: 600;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
