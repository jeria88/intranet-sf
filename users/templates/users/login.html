{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Intranet SFA</title>
    <link rel="stylesheet" href="{% static 'css/main.min.css' %}">
    <style>
        :root {
            --contrast: #222222;
            --contrast-2: #575760;
            --contrast-3: #b2b2be;
            --base: #f0f0f0;
            --base-2: #f7f8f9;
            --base-3: #ffffff;
            --accent: #1e73be;
        }

        body {
            background-color: var(--base-2);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--base-3);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card img {
            width: 80px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 700;
            color: var(--contrast);
        }

        .login-card p.subtitle {
            color: var(--contrast-2);
            font-size: 13px;
            margin: 0 0 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--contrast-2);
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            box-sizing: border-box;
            border: 1px solid var(--base);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: opacity .2s;
        }

        .btn-login:hover {
            opacity: 0.88;
        }

        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-bottom: 16px;
            background: #fdf0f0;
            border-radius: 8px;
            padding: 10px;
        }

        .help-text {
            margin-top: 20px;
            font-size: 12px;
            color: var(--contrast-3);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="{% static 'img/logo.png' %}" alt="Logo SFA">
        <h2>Intranet SFA</h2>
        <p class="subtitle">Congregación Hermanas Terceras Franciscanas</p>

        {% if form.errors %}
        <div class="error-msg">
            Usuario o contraseña incorrectos. Intente nuevamente.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nombre de Usuario</label>
                <input type="text" id="id_username" name="username" placeholder="usuario" autocomplete="username"
                    required>
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                <input type="password" id="id_password" name="password" placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit" class="btn-login">ENTRAR AL PORTAL</button>
        </form>
        <p class="help-text">¿Problemas de acceso? Contacte a soporte@sfared.cl</p>
    </div>
</body>

</html>
