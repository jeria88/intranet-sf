{% extends 'base.html' %}
{% block title %}Sesión Cerrada | Intranet SFA{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 80px auto; text-align: center; background: white; padding: 50px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    <div style="font-size: 64px; margin-bottom: 24px;">👋</div>
    <h2 style="color: var(--contrast); margin-bottom: 12px; font-weight: 700;">Sesión Cerrada</h2>
    <p style="color: var(--contrast-2); font-size: 16px; line-height: 1.6; margin-bottom: 32px;">
        Haz cerrado sesión correctamente. Gracias por usar la Intranet SFA.
    </p>
    <a href="{% url 'users:login' %}" style="display: inline-block; background: var(--accent); color: white; text-decoration: none; padding: 14px 35px; border-radius: 30px; font-weight: 600; transition: transform 0.2s, background 0.2s;">
        Volver a Iniciar Sesión
    </a>
</div>

<style>
    /* Estilo adicional para que el layout de la base sea más limpio aquí */
    .portal-layout { grid-template-columns: 1fr !important; }
    aside.sidebar-panel { display: none !important; }
</style>
{% endblock %}
