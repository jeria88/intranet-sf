name: Process Meeting Recordings

on:
  schedule:
    - cron: '*/15 * * * *'  # Corre cada 15 minutos
  workflow_dispatch:      # Permite correrlo manualmente

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install requests pydub openai

      - name: Run processing script
        env:
          DJANGO_API_URL: ${{ secrets.DJANGO_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/process_recordings.py
